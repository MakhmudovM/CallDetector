<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call App Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-viewport">
        <div id="main-screen" class="screen active">
            <header class="header">
                <h1>Звонки</h1>
                <button class="settings-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </header>

            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Поиск контактов...">
            </div>

            <div class="scroll-content">
                <p class="label">НЕДАВНИЕ</p>
                <div class="contact-card" onclick="startCall('Алексей Иванов', 'AI')">
                    <div class="avatar blue-grad">AI</div>
                    <div class="info">
                        <span class="name">Алексей Иванов</span>
                        <span class="meta">10:30 • 5 мин</span>
                    </div>
                    <div class="call-btn-small"><svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.15 15.15 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.11-.27 11.72 11.72 0 0 0 3.67.58 1 1 0 0 1 1 1v3.59a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.59a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .58 3.67 1 1 0 0 1-.27 1.11z"/></svg></div>
                </div>

                <div class="contact-card" onclick="startCall('Мария Петрова', 'MP')">
                    <div class="avatar blue-grad">MP</div>
                    <div class="info">
                        <span class="name">Мария Петрова</span>
                        <span class="meta">09:15 • 12 мин</span>
                    </div>
                    <div class="call-btn-small"><svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.15 15.15 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.11-.27 11.72 11.72 0 0 0 3.67.58 1 1 0 0 1 1 1v3.59a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.59a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .58 3.67 1 1 0 0 1-.27 1.11z"/></svg></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active"><div class="n-ico">📞</div><span>Звонки</span></div>
                <div class="nav-item"><div class="n-ico">👤</div><span>Контакты</span></div>
                <div class="nav-item"><div class="n-ico">🕒</div><span>История</span></div>
            </nav>
        </div>

        <div id="call-screen" class="screen">
            <div class="call-top">
                <button class="close-btn" onclick="endCall()">✕</button>
                <div class="call-status">Идет звонок</div>
                <div style="width:36px"></div>
            </div>

            <div class="call-main">
                <div id="call-avatar" class="avatar-large">AI</div>
                <h2 id="call-name">Алексей Иванов</h2>
                <div id="timer" class="timer">00:00</div>

                <div class="glass-card">
                    <div class="dashed-circle"></div>
                    <p>Дополнительная информация</p>
                </div>
            </div>

            <div class="call-footer">
                <div class="controls-row">
                    <button class="c-btn"><svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
                    <button class="c-btn"><svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
                    <button class="c-btn"><svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></button>
                </div>
                <button class="hangup-btn" onclick="endCall()">
                    <svg width="20" height="20" fill="white" viewBox="0 0 24 24" style="transform:rotate(135deg)"><path d="M6.62 10.79a15.15 15.15 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.11-.27 11.72 11.72 0 0 0 3.67.58 1 1 0 0 1 1 1v3.59a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.59a1 1 0 0 1 1 1 11.72 11.72 0 0 0 .58 3.67 1 1 0 0 1-.27 1.11z"/></svg>
                    Завершить звонок
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
